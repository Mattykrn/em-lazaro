        };

        // ═══════════════════════════════════════════════════════════════
        // 📔 ESTO ES LA LIBRETA DIGITAL (FIADOS)
        // ═══════════════════════════════════════════════════════════════
        // Es como el cuaderno de deudas, pero en la computadora.
        // Nunca más olvidas quién debe o cuánto.
        // Funciones principales:
        // - ➕ Nuevo Cliente: Registra a un vecino para fiado
        // - 👁️ Ver lista: Todos los clientes y cuánto deben
        // - 💰 Registrar Pago: Cuando vienen a pagar, reduce su deuda
        // - Búsqueda: Encuentra fácilmente por nombre
        // - Alertas: Muestra clientes con deuda > límite configurado
        // Cuando vendes fiado en el POS, automáticamente:
        // - Se suma a la deuda del cliente
        // - Aparece en rojo si es mucho
        // - Recibes alerta si supera límite máximo
        // ═══════════════════════════════════════════════════════════════

        // Customers View
        const CustomersView = ({ store }) => {
            const [searchTerm, setSearchTerm] = React.useState('');
            const [showAddModal, setShowAddModal] = React.useState(false);
            const [selectedCustomer, setSelectedCustomer] = React.useState(null);
            const [paymentAmount, setPaymentAmount] = React.useState('');
            const [newCustomer, setNewCustomer] = React.useState({
                name: '',
                phone: '',
                address: '',
                balance: 0
            });

            const handleInputChange = (field, value) => {
                setNewCustomer(prev => ({ ...prev, [field]: value }));
            };

            const addCustomer = () => {
                if (!newCustomer.name) {
                    window.showToast('El nombre es obligatorio', 'error');
                    return;
                }

                try {
                    const customer = {
                        id: Date.now(),
                        name: newCustomer.name,
                        phone: newCustomer.phone,
                        address: newCustomer.address,
                        balance: parseFloat(newCustomer.balance) || 0,
                        paymentHistory: [],
                        createdAt: new Date().toISOString()
                    };

                    store.customers = store.customers || [];
                    store.customers.push(customer);

                    if (window.store && window.store.save) {
                        window.store.save();
                    } else {
                        localStorage.setItem('kiosco_master_data', JSON.stringify(store));
                    }

                    window.showToast('✅ Cliente agregado correctamente', 'success');
                    setNewCustomer({ name: '', phone: '', address: '', balance: 0 });
                    setShowAddModal(false);
                    window.dispatchEvent(new CustomEvent('storeUpdate'));
                } catch (err) {
                    console.error('Error al agregar cliente:', err);
                    window.showToast('Error al agregar el cliente', 'error');
                }
            };

            const recordPayment = () => {
                const amount = parseFloat(paymentAmount);
                if (!amount || amount <= 0) {
                    window.showToast('Ingresa un monto válido', 'error');
                    return;
                }

                const customer = store.customers.find(c => c.id === selectedCustomer.id);
                if (!customer) return;

                if (amount > customer.balance) {
                    window.showToast(`El cliente solo debe $${customer.balance.toLocaleString()}`, 'error');
                    return;
                }

                customer.balance -= amount;
                customer.paymentHistory = customer.paymentHistory || [];
                customer.paymentHistory.push({
                    amount: amount,
                    date: new Date().toISOString(),
                    type: 'payment'
                });

                if (window.store && window.store.save) {
                    window.store.save();
                } else {
                    localStorage.setItem('kiosco_master_data', JSON.stringify(store));
                }

                window.showToast(`✅ Pago de $${amount.toLocaleString()} registrado`, 'success');
                setPaymentAmount('');
                setSelectedCustomer(null);
                window.dispatchEvent(new CustomEvent('storeUpdate'));
            };

            const getTotalPaid = (customer) => {
                if (!customer.paymentHistory) return 0;
                return customer.paymentHistory.reduce((sum, payment) => sum + payment.amount, 0);
            };

            const customers = store.customers || [];
            const filteredCustomers = customers.filter(customer =>
                customer.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                customer.phone?.includes(searchTerm)
            );

            return (
                <div className="fade-in">
                    <div className="flex-between" style={{marginBottom: '2rem', marginTop: '1rem'}}>
                        <h1>📖 La Libreta (Clientes)</h1>
                        <button className="btn btn-primary" onClick={() => setShowAddModal(true)} style={{height: '3rem', fontSize: '1rem'}}>
                            ➕ Agregar Cliente
                        </button>
                    </div>

                    <div className="card" style={{marginBottom: '2rem', padding: '1rem'}}>
                        <input
                            type="text"
                            placeholder="Buscar clientes por nombre o teléfono..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="input"
                        />
                    </div>

                    <div className="card" style={{padding: 0, overflow: 'hidden'}}>
                        {filteredCustomers.length === 0 ? (
                            <div style={{textAlign: 'center', padding: '3rem', color: '#999'}}>
                                {searchTerm ? 'No se encontraron clientes' : 'No hay clientes registrados'}
                            </div>
                        ) : (
                            <table className="table">
                                <thead>
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Teléfono</th>
                                        <th>Deuda Actual</th>
                                        <th>Pagado Total</th>
                                        <th>Estado</th>
                                        <th style={{textAlign: 'right'}}>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredCustomers.map(customer => {
                                        const totalPaid = getTotalPaid(customer);
                                        const statusEmoji = customer.balance === 0 ? '✅' : totalPaid > 0 ? '🔄' : '💳';
                                        const statusText = customer.balance === 0 ? 'Pagado' : totalPaid > 0 ? 'Deuda Parcial' : 'Sin Pagar';
                                        const statusColor = customer.balance === 0 ? '#22c55e' : totalPaid > 0 ? '#f59e0b' : '#ef4444';

                                        return (
                                            <tr key={customer.id}>
                                                <td style={{fontWeight: 'bold'}}>{customer.name}</td>
                                                <td className="text-muted">{customer.phone || '-'}</td>
                                                <td style={{fontWeight: 'bold', color: customer.balance > 0 ? 'var(--danger)' : 'var(--success)'}}>${(customer.balance || 0).toLocaleString()}</td>
                                                <td style={{color: totalPaid > 0 ? 'var(--success)' : '#999', fontWeight: totalPaid > 0 ? 'bold' : 'normal'}}>
                                                    {totalPaid > 0 ? `$${totalPaid.toLocaleString()}` : '-'}
                                                </td>
                                                <td>
                                                    <span className="badge" style={{background: statusColor, color: 'white'}}>
                                                        {statusEmoji} {statusText}
                                                    </span>
                                                </td>
                                                <td style={{textAlign: 'right'}}>
                                                    {customer.balance > 0 && (
                                                        <button 
                                                            className="btn btn-ghost btn-sm"
                                                            onClick={() => setSelectedCustomer(customer)}
                                                            title="Registrar pago"
                                                            style={{color: 'var(--primary)'}}
                                                        >
                                                            💰 Pago
                                                        </button>
                                                    )}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {showAddModal && (
                        <div className="modal-overlay active" style={{display: 'flex', position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.7)', zIndex: 1000, justifyContent: 'center', alignItems: 'center'}}>
                            <div className="card" style={{maxWidth: '600px', width: '90%'}}>
                                <div className="flex-between" style={{marginBottom: '1.5rem'}}>
                                    <h2>➕ Nuevo Cliente</h2>
                                    <button className="btn btn-ghost" onClick={() => setShowAddModal(false)}>×</button>
                                </div>

                                <div className="grid grid-cols-2" style={{gap: '1rem', marginBottom: '1.5rem'}}>
                                    <div style={{gridColumn: 'span 2'}}>
                                        <label className="label">Nombre del cliente *</label>
                                        <input 
                                            type="text" 
                                            className="input" 
                                            placeholder="Juan Pérez"
                                            value={newCustomer.name} 
                                            onChange={(e) => handleInputChange('name', e.target.value)}
                                            autoFocus
                                        />
                                    </div>
                                    <div>
                                        <label className="label">Teléfono</label>
                                        <input 
                                            type="text" 
                                            className="input" 
                                            placeholder="1234567890"
                                            value={newCustomer.phone} 
                                            onChange={(e) => handleInputChange('phone', e.target.value)}
                                        />
                                    </div>
                                    <div>
                                        <label className="label">Dirección</label>
                                        <input 
                                            type="text" 
                                            className="input" 
                                            placeholder="Calle y número"
                                            value={newCustomer.address} 
                                            onChange={(e) => handleInputChange('address', e.target.value)}
                                        />
                                    </div>
                                    <div style={{gridColumn: 'span 2'}}>
                                        <label className="label">Deuda Inicial ($)</label>
                                        <input 
                                            type="number" 
                                            className="input" 
                                            placeholder="0.00"
                                            step="0.01"
                                            value={newCustomer.balance} 
                                            onChange={(e) => handleInputChange('balance', e.target.value)}
                                        />
                                    </div>
                                </div>

                                <div className="flex-between" style={{gap: '1rem'}}>
                                    <button className="btn btn-ghost" onClick={() => setShowAddModal(false)} style={{flex: 1}}>
                                        Cancelar
                                    </button>
                                    <button className="btn btn-success" onClick={addCustomer} style={{flex: 1, height: '2.5rem', fontSize: '1rem', fontWeight: 'bold'}}>
                                        ✅ Guardar Cliente
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedCustomer && (
                        <div className="modal-overlay active" style={{display: 'flex', position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.7)', zIndex: 1000, justifyContent: 'center', alignItems: 'center'}}>
                            <div className="card" style={{maxWidth: '500px', width: '90%'}}>
                                <div className="flex-between" style={{marginBottom: '1.5rem'}}>
                                    <h2>💰 Registrar Pago</h2>
                                    <button className="btn btn-ghost" onClick={() => setSelectedCustomer(null)}>×</button>
                                </div>

                                <div style={{background: 'var(--bg-color)', padding: '1rem', borderRadius: '8px', marginBottom: '1.5rem'}}>
                                    <div style={{marginBottom: '1rem'}}>
                                        <div className="text-muted" style={{fontSize: '0.9rem', marginBottom: '0.5rem'}}>Cliente</div>
                                        <div style={{fontSize: '1.1rem', fontWeight: 'bold'}}>{selectedCustomer.name}</div>
                                    </div>
                                    <div style={{marginBottom: '1rem'}}>
                                        <div className="text-muted" style={{fontSize: '0.9rem', marginBottom: '0.5rem'}}>Deuda Actual</div>
                                        <div style={{fontSize: '1.3rem', fontWeight: 'bold', color: 'var(--danger)'}}>${selectedCustomer.balance.toLocaleString()}</div>
                                    </div>
                                    <div>
                                        <div className="text-muted" style={{fontSize: '0.9rem', marginBottom: '0.5rem'}}>Total Pagado</div>
                                        <div style={{fontSize: '1.1rem', fontWeight: 'bold', color: 'var(--success)'}}>${getTotalPaid(selectedCustomer).toLocaleString()}</div>
                                    </div>
                                </div>

                                <div style={{marginBottom: '1.5rem'}}>
                                    <label className="label">Monto a Registrar ($)</label>
                                    <input 
                                        type="number" 
                                        className="input" 
                                        placeholder={selectedCustomer.balance.toString()}
                                        step="0.01"
                                        value={paymentAmount} 
                                        onChange={(e) => setPaymentAmount(e.target.value)}
                                        autoFocus
                                    />
                                </div>

                                <div className="flex-between" style={{gap: '1rem'}}>
                                    <button className="btn btn-ghost" onClick={() => setSelectedCustomer(null)} style={{flex: 1}}>
                                        Cancelar
                                    </button>
                                    <button className="btn btn-success" onClick={recordPayment} style={{flex: 1, height: '2.5rem', fontSize: '1rem', fontWeight: 'bold'}}>
                                        ✅ Registrar Pago
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ═══════════════════════════════════════════════════════════════
        // ⚙️ ESTO ES EL PANEL DE CONFIGURACIÓN
        // ═══════════════════════════════════════════════════════════════
        // Aquí configuras TODO el sistema.
        // Una vez hecho, el programa funciona automáticamente.
        // Es el "panel de control" de tu negocio. Secciones:
        // 
        // 1. Datos de tu Negocio
        //    - Nombre del kiosco
        //    - Dirección y teléfono
        //    - Horario de atención
        //    (Aparecen en tickets impresos)
        //
        // 2. Mercado Pago (Para cobrar por transferencia)
        //    - Alias (@tunombre)
        //    - CVU (22 dígitos)
        //    - Access Token
        //    (Cuando cobres por transferencia, mostrarás esto + QR)
        //
        // 3. Alertas por WhatsApp
        //    - Tu número de WhatsApp
        //    - Qué eventos quieres notificaciones
        //    (Recibes avisos en tiempo real)
        //
        // 4. Límite de Fiado
        //    - Máximo que puede deber cada cliente
        //    (Sistema avisa si va a superarlo)
        //
        // 5. Apariencia
        //    - Modo oscuro/claro
        //    - Tamaño de fuente
        //    - Tema de colores
        //
        // 6. Seguridad & Copias de Seguridad
        //    - 📥 Exportar Todo (HAZLO CADA SEMANA)
        //    - 📤 Importar Datos (Si falla tu compu)
        //    - 🗑️ Borrar Todo (Cuidado: sin vuelta atrás)
        // ═══════════════════════════════════════════════════════════════

        // Settings View
        const SettingsView = ({ store }) => {
            const [settings, setSettings] = React.useState(store.settings || {});
            const [businessData, setBusinessData] = React.useState({
                name: store.businessName || '',
                phone: store.businessPhone || '',
                address: store.businessAddress || '',
                hours: store.businessHours || ''
            });

            const updateSetting = (key, value) => {
                const updated = { ...settings, [key]: value };
                setSettings(updated);
                store.settings = updated;
                if (window.store && window.store.save) {
                    window.store.save();
                } else {
                    localStorage.setItem('kiosco_master_data', JSON.stringify(store));
                }
                window.dispatchEvent(new CustomEvent('storeUpdate'));
                window.showToast('✅ Configuración guardada', 'success');
            };

            const updateBusinessData = (field, value) => {
                const updated = { ...businessData, [field]: value };
                setBusinessData(updated);
                store['business' + field.charAt(0).toUpperCase() + field.slice(1)] = value;
                if (window.store && window.store.save) {
                    window.store.save();
                } else {
                    localStorage.setItem('kiosco_master_data', JSON.stringify(store));
                }
                window.showToast('✅ Datos del negocio actualizados', 'success');
            };

            const exportData = () => {
                const dataToExport = JSON.stringify(store, null, 2);
                const blob = new Blob([dataToExport], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `kiosco-backup-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
                window.showToast('✅ Datos exportados correctamente', 'success');
            };

            const importData = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const imported = JSON.parse(event.target.result);
                            Object.assign(store, imported);
                            localStorage.setItem('kiosco_master_data', JSON.stringify(store));
                            window.dispatchEvent(new CustomEvent('storeUpdate'));
                            window.showToast('✅ Datos restaurados correctamente', 'success');
                            window.location.reload();
                        } catch (err) {
                            window.showToast('❌ Error al importar datos', 'error');
                            console.error(err);
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            };

            const clearAllData = () => {
                if (confirm('⚠️ ¿ESTÁS SEGURO? Se borrarán TODOS los datos. No se puede deshacer.')) {
                    if (confirm('🔴 Segunda confirmación: ¿Realmente quieres borrar TODO?')) {
                        localStorage.removeItem('kiosco_master_data');
                        window.location.reload();
                    }
                }
            };

            return (
                <div className="fade-in">
                    <div style={{marginBottom: '2rem', marginTop: '1rem'}}>
                        <h1>⚙️ Configuración</h1>
                    </div>

                    {/* Datos del Negocio */}
                    <div className="card">
                        <h3>🏪 Datos de tu Negocio</h3>
                        <p style={{color: '#999', marginBottom: '1.5rem'}}>Estos datos aparecen en los tickets impresos</p>
                        <div className="grid grid-cols-2" style={{gap: '1rem', marginBottom: '1.5rem'}}>
                            <div style={{gridColumn: 'span 2'}}>
                                <label className="label">Nombre del Negocio</label>
                                <input 
                                    type="text" 
                                    className="input" 
                                    placeholder="Mi Kiosco o Almacén Don Julio"
                                    value={businessData.name}
                                    onChange={(e) => updateBusinessData('name', e.target.value)}
                                />
                            </div>
                            <div>
                                <label className="label">Teléfono</label>
                                <input 
                                    type="text" 
                                    className="input" 
                                    placeholder="+54 11 1234-5678"
                                    value={businessData.phone}
                                    onChange={(e) => updateBusinessData('phone', e.target.value)}
                                />
                            </div>
                            <div>
                                <label className="label">Dirección</label>
                                <input 
                                    type="text" 
                                    className="input" 
                                    placeholder="Avenida Siempre Viva 123"
                                    value={businessData.address}
                                    onChange={(e) => updateBusinessData('address', e.target.value)}
                                />
                            </div>
                            <div style={{gridColumn: 'span 2'}}>
                                <label className="label">Horario de Atención</label>
                                <input 
                                    type="text" 
                                    className="input" 
                                    placeholder="Lun-Sab 8am-10pm / Dom 9am-9pm"
                                    value={businessData.hours}
                                    onChange={(e) => updateBusinessData('hours', e.target.value)}
                                />
                            </div>
                        </div>
                    </div>

                    {/* Mercado Pago */}
                    <div className="card">
                        <h3>💳 Integración Mercado Pago</h3>
                        <p style={{color: '#999', marginBottom: '0.5rem'}}>Para cobrar por transferencia sin comisión</p>
                        <div style={{background: '#f0f9ff', borderLeft: '4px solid #0ea5e9', padding: '1rem', borderRadius: '0 8px 8px 0', marginBottom: '1.5rem', fontSize: '0.9rem', color: '#0c4a6e'}}>
                            <strong>📌 Paso 1:</strong> Ve a mercadopago.com.ar → Tu información → Busca tu Alias y CVU<br/>
                            <strong>📌 Paso 2:</strong> Copia y pega los 3 datos aquí
                        </div>
                        <div className="grid grid-cols-2" style={{gap: '1rem', marginBottom: '1.5rem'}}>
                            <div>
                                <label className="label">Alias (@tunombre)</label>
                                <input 
                                    type="text" 
                                    className="input" 
                                    placeholder="@tunombre"
                                    value={settings.alias || ''}
                                    onChange={(e) => updateSetting('alias', e.target.value)}
                                />
                            </div>
                            <div>
                                <label className="label">CVU (22 dígitos)</label>
                                <input 
                                    type="text" 
                                    className="input" 
                                    placeholder="0000003100991234567890"
                                    value={settings.cvu || ''}
                                    onChange={(e) => updateSetting('cvu', e.target.value)}
                                />
                            </div>
                            <div style={{gridColumn: 'span 2'}}>
                                <label className="label">Access Token (Opcional)</label>
                                <input 
                                    type="password" 
                                    className="input" 
                                    placeholder="Tu token de acceso de Mercado Pago"
                                    value={settings.mpAccessToken || ''}
                                    onChange={(e) => updateSetting('mpAccessToken', e.target.value)}
                                />
                            </div>
                        </div>
                    </div>

                    {/* WhatsApp */}
                    <div className="card">
                        <h3>📱 Alertas por WhatsApp</h3>
                        <p style={{color: '#999', marginBottom: '1.5rem'}}>Recibe notificaciones en tiempo real sobre tu negocio</p>
                        <div style={{gap: '1rem', marginBottom: '1.5rem'}}>
                            <div>
                                <label className="label">Tu número de WhatsApp</label>
                                <input 
                                    type="text" 
                                    className="input" 
                                    placeholder="+54 11 1234-5678"
                                    value={settings.whatsappNumber || ''}
                                    onChange={(e) => updateSetting('whatsappNumber', e.target.value)}
                                />
                            </div>
                            <div style={{marginTop: '1rem', padding: '1rem', background: 'var(--bg-color)', borderRadius: '8px'}}>
                                <div style={{fontSize: '0.9rem', marginBottom: '0.5rem', fontWeight: 'bold'}}>Alertas que recibirás:</div>
                                <div style={{fontSize: '0.85rem', color: '#999'}}>
                                    ✓ Stock bajo en productos<br/>
                                    ✓ Cliente con deuda alta<br/>
                                    ✓ Cierre de caja diario
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Límites */}
                    <div className="card">
                        <h3>📔 Política de Fiado</h3>
                        <p style={{color: '#999', marginBottom: '1.5rem'}}>Define límites para evitar deudas peligrosas</p>
                        <div className="grid grid-cols-2" style={{gap: '1rem', marginBottom: '1.5rem'}}>
                            <div>
                                <label className="label">Límite máximo por cliente ($)</label>
                                <input 
                                    type="number" 
                                    className="input" 
                                    placeholder="5000"
                                    value={settings.creditLimit || 5000}
                                    onChange={(e) => updateSetting('creditLimit', parseFloat(e.target.value) || 5000)}
                                />
                            </div>
                            <div>
                                <label className="label">Stock bajo = menos de</label>
                                <input 
                                    type="number" 
                                    className="input" 
                                    placeholder="5"
                                    min="1"
                                    value={settings.lowStockThreshold || 5}
                                    onChange={(e) => updateSetting('lowStockThreshold', parseInt(e.target.value) || 5)}
                                />
                                <small style={{color: '#999'}}>Unidades</small>
                            </div>
                        </div>
                    </div>

                    {/* Apariencia */}
                    <div className="card">
                        <h3>🌐 Apariencia</h3>
                        <p style={{color: '#999', marginBottom: '1.5rem'}}>Personaliza cómo se ve el programa</p>
                        <div style={{padding: '1rem', background: 'var(--bg-color)', borderRadius: '8px'}}>
                            <div style={{marginBottom: '1rem'}}>
                                <label className="label">Tema</label>
                                <div style={{display: 'flex', gap: '1rem', marginTop: '0.5rem'}}>
                                    <button className="btn btn-secondary" style={{flex: 1}}>🌙 Modo Oscuro (Por defecto)</button>
                                </div>
                            </div>
                            <div>
                                <label className="label">Tamaño de Fuente</label>
                                <div style={{display: 'flex', gap: '1rem', marginTop: '0.5rem'}}>
                                    <button className="btn btn-ghost" style={{flex: 1}}>A-</button>
                                    <button className="btn btn-primary" style={{flex: 1}}>A Normal</button>
                                    <button className="btn btn-ghost" style={{flex: 1}}>A+</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Seguridad */}
                    <div className="card">
                        <h3>🔒 Seguridad</h3>
                        <p style={{color: '#999', marginBottom: '1.5rem'}}>Protege tu datos y tu negocio</p>
                        <div style={{background: '#fff1f2', borderLeft: '4px solid var(--danger)', padding: '1rem', borderRadius: '0 8px 8px 0', marginBottom: '1.5rem', fontSize: '0.9rem', color: '#7c2d12'}}>
                            <strong>⚠️ IMPORTANTE:</strong> Guarda tu compu con contraseña. No dejes el programa sin supervisión.
                        </div>
                        <div className="grid grid-cols-2" style={{gap: '1rem'}}>
                            <div>
                                <button className="btn btn-primary" onClick={exportData} style={{width: '100%', height: '3rem'}}>
                                    📥 Exportar Todo
                                </button>
                                <small style={{color: '#999', marginTop: '0.5rem', display: 'block'}}>Guarda en pendrive/Google Drive</small>
                            </div>
                            <div>
                                <button className="btn btn-secondary" onClick={importData} style={{width: '100%', height: '3rem'}}>
                                    📤 Importar Datos
                                </button>
                                <small style={{color: '#999', marginTop: '0.5rem', display: 'block'}}>Si tu compu falla</small>
                            </div>
                        </div>
                    </div>

                    {/* Zona de Peligro */}
                    <div className="card" style={{borderLeft: '4px solid var(--danger)'}}>
                        <h3 style={{color: 'var(--danger)'}}>🔴 Zona de Peligro</h3>
                        <p style={{color: '#999', marginBottom: '1.5rem'}}>Cuidado: Estas acciones NO se pueden deshacer</p>
                        <div>
                            <button 
                                className="btn" 
                                onClick={clearAllData} 
                                style={{width: '100%', background: 'var(--danger)', color: 'white', height: '3rem', fontWeight: 'bold'}}
                            >
                                🗑️ Borrar TODO (Sin vuelta atrás)
                            </button>
                        </div>
                    </div>

                    {/* Info del Sistema */}
                    <div className="card">
                        <h3>ℹ️ Información del Sistema</h3>
                        <div style={{padding: '1rem', background: 'var(--bg-color)', borderRadius: '8px', fontSize: '0.9rem'}}>
                            <div style={{marginBottom: '0.75rem'}}>
                                <strong>Versión:</strong> Kiosco Master v1.0.0
                            </div>
                            <div style={{marginBottom: '0.75rem'}}>
                                <strong>Productos registrados:</strong> {store.products?.length || 0}
                            </div>
                            <div style={{marginBottom: '0.75rem'}}>
                                <strong>Clientes:</strong> {store.customers?.length || 0}
                            </div>
                            <div>
                                <strong>Ventas totales:</strong> {store.sales?.length || 0}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [currentView, setCurrentView] = React.useState('dashboard');
            const [appStore, setAppStore] = React.useState(null);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                const initializeApp = async () => {
                    try {
                        if (typeof store === 'undefined') {
                            console.warn('Store undefined, creating one...');
                            window.store = {
                                state: {
                                    products: [],
                                    sales: [],
                                    customers: [],
                                    sessionHistory: [],
                                    session: { isOpen: false, startTime: null, totalSales: 0, initialCash: 0, salesIds: [] },
                                    settings: { whatsappNumber: '', lowStockThreshold: 5, creditLimit: 5000, alias: '', cvu: '', paymentLink: '', qrFile: '', qrImage: null, mpAccessToken: '', mpLastMovementId: null, usedMovementIds: [] },
                                    pendingTransfers: []
                                },
                                load() { const data = localStorage.getItem('kiosco_master_data'); if (data) { const loaded = JSON.parse(data); this.state = { ...this.state, ...loaded }; } else { this.save(); } },
                                save() { localStorage.setItem('kiosco_master_data', JSON.stringify(this.state)); window.dispatchEvent(new CustomEvent('storeUpdate')); }
                            };
                        }

                        store.load();

                        setAppStore({ ...store.state });
                        setLoading(false);

                        const updateHandler = () => {
                            setAppStore({ ...store.state });
                        };
                        window.addEventListener('storeUpdate', updateHandler);

                        const handleRoute = () => {
                            const hash = window.location.hash.substring(1) || 'dashboard';
                            setCurrentView(hash);
                        };

                        handleRoute();
                        window.addEventListener('hashchange', handleRoute);

                        return () => {
                            window.removeEventListener('storeUpdate', updateHandler);
                            window.removeEventListener('hashchange', handleRoute);
                        };

                    } catch (err) {
                        console.error('❌ Error:', err);
                        setLoading(false);
                    }
                };

                initializeApp();
            }, []);

            const handleNavClick = (view) => {
                window.location.hash = view;
            }

            if (loading) {
                return (
                    <div style={{display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh', fontSize: '1.2rem', color: 'var(--primary)'}}>
                        <div style={{textAlign: 'center'}}>
                            <div style={{marginBottom: '1rem'}}>🔄 Cargando Kiosco Master...</div>
                        </div>
                    </div>
                );
            }

            return (
                <div id="app">
                    <aside className="sidebar">
                        <div className="nav-logo">
                            <span>📦 Kiosco Master</span>
                        </div>
                        <nav>
                            <ul className="nav-links">
                                <li>
                                    <a href="#dashboard" className={`nav-item ${currentView === 'dashboard' ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); handleNavClick('dashboard'); }}>
                                        📊 Panel Principal
                                    </a>
                                </li>
                                <li>
                                    <a href="#ventas" className={`nav-item ${currentView === 'ventas' ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); handleNavClick('ventas'); }}>
                                        🛒 Nueva Venta
                                    </a>
                                </li>
                                <li>
                                    <a href="#inventario" className={`nav-item ${currentView === 'inventario' ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); handleNavClick('inventario'); }}>
                                        📦 Inventario
                                    </a>
                                </li>
                                <li>
                                    <a href="#caja" className={`nav-item ${currentView === 'caja' ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); handleNavClick('caja'); }}>
                                        🧮 Cierre de Caja
                                    </a>
                                </li>
                                <li>
                                    <a href="#customers" className={`nav-item ${currentView === 'customers' ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); handleNavClick('customers'); }}>
                                        📖 La Libreta
                                    </a>
                                </li>
                                <li>
                                    <a href="Manual_de_Usuario.html" target="_blank" className="nav-item">
                                        ❓ Ayuda y Manual
                                    </a>
                                </li>
                                <li>
                                    <a href="#config" className={`nav-item ${currentView === 'config' ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); handleNavClick('config'); }}>
                                        ⚙️ Configuración
                                    </a>
                                </li>
                            </ul>
                        </nav>
                        <div style={{marginTop: 'auto', paddingTop: '2rem', borderTop: '1px solid var(--border-color)'}}>
                            <div className="text-muted" style={{fontSize: '0.75rem'}}>
                                v2.1.0 - React Hooks
                            </div>
                        </div>
                    </aside>

                    <main className="main-content" id="view-container">
                        {currentView === 'dashboard' && <DashboardView store={appStore} />}
                        {currentView === 'ventas' && <POSView store={appStore} />}
                        {currentView === 'inventario' && <InventoryView store={appStore} />}
                        {currentView === 'caja' && <CashierView store={appStore} />}
                        {currentView === 'customers' && <CustomersView store={appStore} />}
                        {currentView === 'config' && <SettingsView store={appStore} />}
                    </main>

                    <div id="react-modal-root"></div>
                    <div className="modal-overlay" id="modal-overlay">
                        <div className="modal" id="modal-content"></div>
                    </div>
                </div>
            );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
